[task]
name = "CausalLanguageModelingNano"

[model]
name = "GPT2"

[model.arch]
vocab_size = 16000
max_len = 1024
n_layers = 2
d_model = 128
n_heads = 4
d_ff = 512
dropout = 0.1

[train]
total_steps = 100
batch_size = 1
grad_accum_steps = 2
max_grad_norm = 1.0
log_interval = 4
eval_interval = 10
warmup_ratio = 0.03
wandb_project = "deep-learning-scratch"

[train.muon]
lr = 2e-2
weight_decay = 0.01

[train.adam]
lr = 3e-4
weight_decay = 0.1
betas = [0.9, 0.95]

[additional]
tokenizer = "trained/tokenizer.json"
