[task]
name = "CausalLanguageModeling"

[model]
name = "GPT2"

[model.arch]
vocab_size = 8000
max_len = 1024
n_layers = 36
d_model = 1280
n_heads = 20
d_ff = 5120
dropout = 0.1

[train]
total_steps = 240000
batch_size = 64
grad_accum_steps = 4
max_grad_norm = 1.0
log_interval = 128
eval_interval = 1024
warmup_ratio = 0.03
wandb_project = "deep-learning-scratch"

[train.muon]
lr = 2e-2
weight_decay = 0.01

[train.adam]
lr = 3e-4
weight_decay = 0.1
betas = [0.9, 0.95]

[additional]
tokenizer = "trained/tokenizer.json"
